name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flake8

    - name: Run Unit Tests
      run: python -m unittest discover -s tests

    - name: Run Linter
      run: flake8 . --max-line-length=120

    - name: Trigger UI Tests
      if: success()
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.UI_REPO_PAT }}
        repository: Alhim616/tvvpz_lab4_task2
        event-type: run-ui-tests